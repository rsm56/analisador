<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S.A.I v7.0 - Gestão Total</title>
    <style>
        :root { --primary: #00ff88; --bg: #0d1117; --card: #16213e; --text: #c9d1d9; --accent: #ffae00; --danger: #ff4d4d; --purp: #8957e5; --look: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 1400px; margin: auto; }
        .menu-topo { display: flex; justify-content: space-between; background: #010409; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--primary); align-items: center; }
        
        .grid-main { display: grid; grid-template-columns: 380px 1fr 1fr; gap: 15px; }
        .panel { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        
        .btn { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: #fff; transition: 0.3s; width: 100%; margin-top: 5px; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-look { background: var(--look); color: #000; }
        .btn-gestor { background: #30363d; color: #fff; }

        textarea { width: 100%; height: 100px; background: #000; color: var(--primary); border: 1px solid #333; padding: 10px; box-sizing: border-box; border-radius: 5px; font-family: monospace; }
        
        /* Rankings */
        .atrasados-list { background: #010409; border-radius: 8px; max-height: 450px; overflow-y: auto; border: 1px solid #333; }
        .bicho-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #222; }
        .rank { width: 25px; font-weight: bold; color: var(--accent); }
        .info { flex-grow: 1; margin-left: 10px; }
        .destaque-atraso { color: var(--danger); font-weight: bold; font-size: 0.8rem; }

        /* Modal Gestor */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; }
        .modal-content { background: var(--bg); margin: 2% auto; padding: 20px; width: 80%; border: 1px solid var(--primary); border-radius: 15px; max-height: 80vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; color: #fff; }
        th, td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu-topo">
        <div>
            <b style="color:var(--primary); font-size: 1.4rem;">S.A.I <span style="font-weight:200">v7.0</span></b>
            <button class="btn-gestor" style="width:auto; margin-left:20px; padding:5px 15px;" onclick="abrirGestor()">📂 GESTOR DE DADOS</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-backup" style="background:#238636; width:auto" onclick="exportarBackup()">📥 SALVAR TXT</button>
            <button class="btn" style="background:var(--purp); width:auto" onclick="document.getElementById('modalInj').style.display='block'">💉 INJETAR</button>
        </div>
    </div>

    <div class="grid-main">
        <div>
            <div class="panel">
                <h3 style="color:var(--primary)">📥 Extração Inteligente (v4.5)</h3>
                <textarea id="injecaoInput" placeholder="Cole o resultado aqui (Rio ou Look)..."></textarea>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn btn-save" onclick="processar('RIO')">LANÇAR RIO</button>
                    <button class="btn btn-look" onclick="processar('LOOK')">LANÇAR LOOK</button>
                </div>
            </div>

            <div class="panel">
                <h3 style="color:var(--accent)">🎯 Lançar Atrasado Manual</h3>
                <small>Caso queira forçar um bicho no topo do atraso:</small>
                <input type="number" id="manualG" placeholder="Grupo" style="width:60px; padding:5px;">
                <input type="number" id="manualD" placeholder="Dias" style="width:60px; padding:5px;">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:5px;">
                    <button class="btn" style="background:#444" onclick="forcarAtraso('RIO')">RIO</button>
                    <button class="btn" style="background:#444" onclick="forcarAtraso('LOOK')">LOOK</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3 style="color:var(--primary)">🏇 RANKING RIO</h3>
            <div id="listaRio" class="atrasados-list"></div>
        </div>

        <div class="panel">
            <h3 style="color:var(--look)">🎯 RANKING LOOK</h3>
            <div id="listaLook" class="atrasados-list"></div>
        </div>
    </div>
</div>

<div id="modalGestor" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--primary)">📂 Gestor de Armazenamento <button onclick="fecharGestor()" style="float:right; cursor:pointer">X</button></h2>
        <table>
            <thead><tr><th>Data/Hora</th><th>Praça</th><th>Milhar</th><th>Grp</th><th>Ação</th></tr></thead>
            <tbody id="corpoGestor"></tbody>
        </table>
    </div>
</div>

<div id="modalInj" class="modal">
    <div class="modal-content">
        <h2>💉 Injetar Backup</h2>
        <textarea id="inputInj" style="height:200px"></textarea>
        <button class="btn btn-save" onclick="injetar()">RESTAURAR AGORA</button>
        <button class="btn" style="background:#333" onclick="this.parentElement.parentElement.style.display='none'">CANCELAR</button>
    </div>
</div>

<script>
    const bichos = {1:"Avestruz", 2:"Águia", 3:"Burro", 4:"Borboleta", 5:"Cachorro", 6:"Cabra", 7:"Carneiro", 8:"Camelo", 9:"Cobra", 10:"Coelho", 11:"Cavalo", 12:"Elefante", 13:"Galo", 14:"Gato", 15:"Jacaré", 16:"Leão", 17:"Macaco", 18:"Porco", 19:"Pavão", 20:"Peru", 21:"Touro", 22:"Tigre", 23:"Urso", 24:"Veado", 25:"Vaca"};
    
    let db = JSON.parse(localStorage.getItem('db_v7')) || [];
    let rRio = JSON.parse(localStorage.getItem('rankRio_v7')) || [];
    let rLook = JSON.parse(localStorage.getItem('rankLook_v7')) || [];

    // Garante que as listas tenham 25 bichos independentes
    function resetRank(lista) {
        if(lista.length === 0) {
            for(let i=1; i<=25; i++) lista.push({g:i, m:"----", d: i, dt: "--/--"});
        }
        return lista.sort((a,b) => b.d - a.d);
    }

    rRio = resetRank(rRio);
    rLook = resetRank(rLook);

    function processar(praca) {
        const txt = document.getElementById('injecaoInput').value;
        const matches = txt.match(/\d{3,4}/g);
        if(!matches) return alert("Nenhum número encontrado!");

        let lista = (praca === 'RIO') ? rRio : rLook;
        
        matches.slice(0, 7).forEach((milhar, i) => {
            milhar = milhar.padStart(4, '0');
            let g = (milhar.slice(-2) === "00") ? 25 : Math.ceil(parseInt(milhar.slice(-2))/4);
            
            db.unshift({ m: milhar, g: g, p: praca, dt: new Date().toLocaleString() });

            if(i === 0) { // O 1º Prêmio reseta o atraso no ranking
                let idx = lista.findIndex(x => x.g === g);
                if(idx !== -1) lista.splice(idx, 1);
                lista.forEach(item => item.d++);
                lista.push({ g: g, m: milhar, d: 0, dt: new Date().toLocaleDateString() });
            }
        });

        lista.sort((a,b) => b.d - a.d);
        salvar();
        render();
        document.getElementById('injecaoInput').value = "";
    }

    function forcarAtraso(praca) {
        let g = parseInt(document.getElementById('manualG').value);
        let d = parseInt(document.getElementById('manualD').value);
        if(!g || g < 1 || g > 25) return alert("Grupo inválido!");
        
        let lista = (praca === 'RIO') ? rRio : rLook;
        let item = lista.find(x => x.g === g);
        if(item) item.d = d;
        lista.sort((a,b) => b.d - a.d);
        salvar();
        render();
    }

    function abrirGestor() {
        const corpo = document.getElementById('corpoGestor');
        corpo.innerHTML = db.map((item, i) => `
            <tr>
                <td>${item.dt}</td>
                <td style="color:${item.p === 'RIO' ? 'var(--primary)' : 'var(--look)'}">${item.p}</td>
                <td>${item.m}</td>
                <td>${item.g}</td>
                <td><button onclick="excluir(${i})" style="color:red; background:none; border:none; cursor:pointer;">EXCLUIR</button></td>
            </tr>
        `).join('');
        document.getElementById('modalGestor').style.display = 'block';
    }

    function excluir(i) {
        if(confirm("Excluir este registro permanentemente?")) {
            db.splice(i, 1);
            salvar();
            abrirGestor();
        }
    }

    function salvar() {
        localStorage.setItem('db_v7', JSON.stringify(db));
        localStorage.setItem('rankRio_v7', JSON.stringify(rRio));
        localStorage.setItem('rankLook_v7', JSON.stringify(rLook));
    }

    function render() {
        const draw = (id, lista) => {
            document.getElementById(id).innerHTML = lista.map((item, index) => `
                <div class="bicho-item">
                    <div class="rank">${index + 1}º</div>
                    <div class="info">
                        <strong>${item.g.toString().padStart(2,'0')} - ${bichos[item.g]}</strong><br>
                        <small>Última: ${item.m} (${item.dt})</small>
                    </div>
                    <div class="destaque-atraso">${item.d} DIAS</div>
                </div>
            `).join('');
        };
        draw('listaRio', rRio);
        draw('listaLook', rLook);
    }

    function fecharGestor() { document.getElementById('modalGestor').style.display = 'none'; }

    function exportarBackup() {
        const blob = new Blob([JSON.stringify({db, rRio, rLook})], {type:'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "sai_v7_backup.txt";
        a.click();
    }

    function injetar() {
        try {
            const data = JSON.parse(document.getElementById('inputInj').value);
            db = data.db || []; rRio = data.rRio || []; rLook = data.rLook || [];
            salvar(); location.reload();
        } catch(e) { alert("Erro no formato!"); }
    }

    render();
</script>
</body>
</html>
