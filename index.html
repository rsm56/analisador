<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S.A.I v4.8 - DUAL RADAR</title>
    <style>
        :root { --primary: #00ff88; --bg: #0d1117; --card: #16213e; --text: #c9d1d9; --accent: #ffae00; --danger: #ff4d4d; --look: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 1300px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #010409; padding: 15px; border-radius: 10px; border: 1px solid var(--primary); margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .panel { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        h3 { margin-top: 0; font-size: 1rem; color: var(--primary); border-bottom: 1px solid #333; padding-bottom: 8px; display: flex; justify-content: space-between; }
        textarea { width: 100%; height: 70px; background: #000; color: var(--primary); border: 1px solid #333; padding: 10px; box-sizing: border-box; border-radius: 5px; }
        .btn { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; color: #fff; }
        .btn-rio { background: var(--primary); color: #000; width: 100%; margin-top: 5px; }
        .btn-look { background: var(--look); color: #000; width: 100%; margin-top: 5px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #333; }
        .big-n { font-size: 2.5rem; font-weight: 900; display: block; }
        .calc-row { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; font-size: 0.85rem; }
        .calc-row input { width: 60px; background: #000; border: 1px solid var(--accent); color: #fff; padding: 4px; text-align: center; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; padding:20px; overflow-y:auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <b style="font-size: 1.5rem; color: var(--primary);">S.A.I v4.8</b>
            <div style="font-size: 0.7rem; color: var(--accent);">RADAR INDEPENDENTE: RIO & LOOK</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn" style="background:var(--accent); color:#000" onclick="document.getElementById('modalReparar').style.display='block'">💉 INJETAR</button>
            <button class="btn" style="background:#30363d" onclick="abrirGestor()">📂 BANCO</button>
            <button class="btn" style="background:#238636" onclick="exportar()">📥 BACKUP</button>
        </div>
    </div>

    <div class="grid">
        <div>
            <div class="panel" style="border-top: 4px solid var(--primary);">
                <h3>🏇 RIO DE JANEIRO</h3>
                <textarea id="inputRio" placeholder="Resultados do Rio..."></textarea>
                <button class="btn btn-rio" onclick="gravar('RIO')">GRAVAR NO RIO</button>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <small style="color:var(--primary)">MAIS ATRASADO RIO</small>
                        <span class="big-n" id="reiRio" style="color:#fff">--</span>
                    </div>
                    <div class="stat-box">
                        <small>TOP 3 RIO</small>
                        <div id="topRio" style="font-weight:bold; margin-top:5px; color:var(--primary)">--</div>
                    </div>
                </div>

                <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
                    <small style="color:var(--accent)">CÁLCULO X7 (BASE RIO)</small>
                    <div class="calc-row">1º <input type="number" id="r1" oninput="execX7('r1','res1')"> <span id="res1"></span></div>
                    <div class="calc-row">3º <input type="number" id="r3" oninput="execX7('r3','res3')"> <span id="res3"></span></div>
                </div>
            </div>
        </div>

        <div>
            <div class="panel" style="border-top: 4px solid var(--look);">
                <h3 style="color:var(--look)">🎯 LOOK GOIÁS</h3>
                <textarea id="inputLook" placeholder="Resultados da Look..."></textarea>
                <button class="btn btn-look" onclick="gravar('LOOK')">GRAVAR NA LOOK</button>

                <div class="stats-grid">
                    <div class="stat-box">
                        <small style="color:var(--look)">MAIS ATRASADO LOOK</small>
                        <span class="big-n" id="reiLook" style="color:#fff">--</span>
                    </div>
                    <div class="stat-box">
                        <small>TOP 3 LOOK</small>
                        <div id="topLook" style="font-weight:bold; margin-top:5px; color:var(--look)">--</div>
                    </div>
                </div>

                <div style="margin-top: 15px; border-top: 1px solid #333; padding-top: 10px;">
                    <small style="color:var(--accent)">CÁLCULO X7 (BASE LOOK)</small>
                    <div class="calc-row">1º <input type="number" id="l1" oninput="execX7('l1','resL1')"> <span id="resL1"></span></div>
                    <div class="calc-row">3º <input type="number" id="l3" oninput="execX7('l3','resL3')"> <span id="resL3"></span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="modalGestor" class="modal">
    <div style="background:var(--bg); max-width: 800px; margin: auto; padding: 20px; border: 1px solid var(--primary); border-radius: 10px;">
        <div style="display:flex; justify-content:space-between; align-items:center"><h2>GESTOR</h2> <button onclick="document.getElementById('modalGestor').style.display='none'">[X]</button></div>
        <div id="corpoTabela" style="max-height:400px; overflow-y:auto"></div>
    </div>
</div>

<div id="modalReparar" class="modal">
    <div style="background:var(--bg); max-width: 500px; margin: auto; padding: 20px; border: 1px solid var(--accent); border-radius: 10px;">
        <h3>INJETAR BACKUP</h3>
        <textarea id="txtInjetar" style="height:150px"></textarea>
        <button class="btn btn-rio" onclick="injeter()">RESTAURAR</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sai_v48_db')) || [];

    function gravar(praca) {
        const id = praca === 'RIO' ? 'inputRio' : 'inputLook';
        const txt = document.getElementById(id).value;
        txt.split('\n').forEach(l => {
            let m = l.match(/\d{3,4}/);
            if(m) {
                let milhar = m[0].padStart(4, '0');
                let grp = (milhar.slice(-2) === "00") ? 25 : Math.ceil(parseInt(milhar.slice(-2))/4);
                db.unshift({ m: milhar, g: grp, p: praca, dt: new Date().toLocaleString() });
            }
        });
        salvar();
        document.getElementById(id).value = "";
    }

    function execX7(id, res) {
        const v = document.getElementById(id).value;
        if(v) {
            let c = (parseInt(v)*7).toString().slice(-3).padStart(3,'0');
            document.getElementById(res).innerHTML = `<b>${c}</b> (Dz: ${c.slice(-2)})`;
        }
    }

        localStorage.setItem('sai_v4
