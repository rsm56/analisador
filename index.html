<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S.A.I v5.5.2 - INTELIGENTE</title>
    <style>
        :root { --primary: #00ff88; --bg: #0d1117; --card: #16213e; --text: #c9d1d9; --accent: #ffae00; --danger: #ff4d4d; --look: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        .panel { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Lista de Atrasados - Formato Solicitado */
        .lista-box { background: #010409; border-radius: 8px; max-height: 500px; overflow-y: auto; border: 1px solid #333; padding: 10px; }
        .bicho-linha { padding: 10px; border-bottom: 1px solid #222; font-size: 0.95rem; line-height: 1.5; cursor: pointer; transition: 0.2s; }
        .bicho-linha:hover { background: #1a1a1a; }
        .bicho-linha b { color: var(--accent); }
        .txt-dias { color: var(--danger); font-weight: bold; }
        .txt-milhar { color: var(--primary); font-family: monospace; font-weight: bold; }

        textarea { width: 100%; height: 120px; background: #000; color: var(--primary); border: 2px solid #333; padding: 10px; border-radius: 5px; box-sizing: border-box; font-family: monospace; }
        textarea:focus { border-color: var(--primary); outline: none; }
        .btn { padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }
        
        .header-sai { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--primary); padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-sai">
        <div>
            <h1 style="margin:0; color:var(--primary);">S.A.I v5.5.2</h1>
            <small>Extra莽茫o Inteligente + Atualiza莽茫o por Clique/Texto</small>
        </div>
        <div id="reiBox" style="text-align: right;">
            <small>MAIS FORTE GERAL:</small><br>
            <b id="grupoRei" style="font-size: 2rem; color: #fff;">--</b>
        </div>
    </div>

    <div class="panel">
        <h3 style="color:var(--accent); margin-top:0;">馃摜 LAN脟AMENTO 脷NICO (Resultados ou Atualiza莽茫o Manual)</h3>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 5px;">
            Cole aqui: O resultado bruto <b>OU</b> a linha do bicho (ex: 馃悇 25 - Vaca atrasado h谩 12 dias...)
        </p>
        <textarea id="campoInteligente" placeholder="Cole aqui qualquer dado e clique na pra莽a correspondente..."></textarea>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <button class="btn" style="background:var(--primary); color:#000;" onclick="processarTudo('RIO')">ATUALIZAR RIO</button>
            <button class="btn" style="background:var(--look); color:#000;" onclick="processarTudo('LOOK')">ATUALIZAR LOOK</button>
        </div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3 style="color:var(--primary); margin-top:0;">馃弴 RIO (Atrasados)</h3>
            <div id="listaRio" class="lista-box"></div>
        </div>
        <div class="panel">
            <h3 style="color:var(--look); margin-top:0;">馃幆 LOOK (Atrasados)</h3>
            <div id="listaLook" class="lista-box"></div>
        </div>
    </div>
</div>

<script>
    const bichosInfo = {1:["Avestruz","馃"],2:["脕guia","馃"],3:["Burro","馃惔"],4:["Borboleta","馃"],5:["Cachorro","馃惗"],6:["Cabra","馃悙"],7:["Carneiro","馃悘"],8:["Camelo","馃惇"],9:["Cobra","馃悕"],10:["Coelho","馃惏"],11:["Cavalo","馃悗"],12:["Elefante","馃悩"],13:["Galo","馃悡"],14:["Gato","馃悎"],15:["Jacar茅","馃悐"],16:["Le茫o","馃"],17:["Macaco","馃悞"],18:["Porco","馃惙"],19:["Pav茫o","馃"],20:["Peru","馃"],21:["Touro","馃悅"],22:["Tigre","馃悈"],23:["Urso","馃惢"],24:["Veado","馃"],25:["Vaca","馃悇"]};

    let dbRio = JSON.parse(localStorage.getItem('db_rio_v552')) || [];
    let dbLook = JSON.parse(localStorage.getItem('db_look_v552')) || [];

    function inicializar(lista) {
        if(lista.length === 0) {
            for(let i=1; i<=25; i++) lista.push({g:i, d:0, m:"----", dt:"--/--/--"});
        }
        return lista;
    }

    dbRio = inicializar(dbRio);
    dbLook = inicializar(dbLook);

    function processarTudo(praca) {
        const entrada = document.getElementById('campoInteligente').value;
        if(!entrada) return;

        let lista = (praca === 'RIO') ? dbRio : dbLook;

        // TENTA IDENTIFICAR SE 脡 UMA LINHA DE ATUALIZA脟脙O MANUAL (馃悇 25 - Vaca atrasado h谩 12 dias...)
        const regexManual = /(\d{1,2})\s*-\s*[a-zA-Z谩脿芒茫茅猫锚铆茂贸么玫枚煤莽]+.*?(\d+)\s*dias.*?(\d{2}\/\d{2}\/\d{2}).*?(\d{4})/i;
        const manualMatch = entrada.match(regexManual);

        if(manualMatch) {
            // Se encontrou o padr茫o, atualiza o bicho espec铆fico
            let g = parseInt(manualMatch[1]);
            let d = parseInt(manualMatch[2]);
            let dt = manualMatch[3];
            let m = manualMatch[4];

            let item = lista.find(x => x.g === g);
            if(item) {
                item.d = d; item.dt = dt; item.m = m;
                alert(`Sucesso! Grupo ${g} atualizado na ${praca}.`);
            }
        } else {
            // SE N脙O 脡 MANUAL, TRATA COMO RESULTADO NORMAL (EXTRA脟脙O DE MILHARES)
            const milhares = entrada.match(/\d{3,4}/g);
            if(milhares) {
                let m1 = milhares[0].padStart(4, '0');
                let g1 = (m1.slice(-2) === "00") ? 25 : Math.ceil(parseInt(m1.slice(-2))/4);
                let hoje = new Date().toLocaleDateString('pt-BR', {year:'2-digit', month:'2-digit', day:'2-digit'});

                lista.forEach(x => {
                    if(x.g === g1) { x.d = 0; x.m = m1; x.dt = hoje; }
                    else { x.d++; }
                });
                alert(`${praca}: 1潞 pr锚mio (${m1}) processado. Atrasos somados.`);
            }
        }

        salvar();
        document.getElementById('campoInteligente').value = "";
    }

    function salvar() {
        localStorage.setItem('db_rio_v552', JSON.stringify(dbRio));
        localStorage.setItem('db_look_v552', JSON.stringify(dbLook));
        render();
    }

    function render() {
        const desenhar = (id, lista) => {
            document.getElementById(id).innerHTML = lista.sort((a,b) => b.d - a.d).map(x => `
                <div class="bicho-linha" title="Clique para editar este bicho" onclick="prepararEdicao('${bichosInfo[x.g][1]} ${x.g} - ${bichosInfo[x.g][0]} atrasado h谩 ${x.d} dias, ${x.dt}, no milhar ${x.m}')">
                    ${bichosInfo[x.g][1]} <b>${x.g.toString().padStart(2,'0')} - ${bichosInfo[x.g][0]}</b> 
                    atrasado h谩 <span class="txt-dias">${x.d} dias</span>, 
                    ${x.dt}, no milhar <span class="txt-milhar">${x.m}</span>
                </div>
            `).join('');
        };
        desenhar('listaRio', dbRio);
        desenhar('listaLook', dbLook);
        
        // Atualiza Grupo Rei (Simples an谩lise de quem tem mais dias de atraso somado)
        let totalAtraso = {};
        for(let i=1; i<=25; i++) {
            let r = dbRio.find(x=>x.g===i);
            let l = dbLook.find(x=>x.g===i);
            totalAtraso[i] = (r ? r.d : 0) + (l ? l.d : 0);
        }
        let rei = Object.keys(totalAtraso).sort((a,b) => totalAtraso[b] - totalAtraso[a])[0];
        document.getElementById('grupoRei').innerText = rei.padStart(2, '0');
    }

    // FACILITADOR: Se clicar na linha, ela vai pro campo de texto pra voc锚 s贸 mudar o n煤mero e salvar
    function prepararEdicao(texto) {
        document.getElementById('campoInteligente').value = texto;
        document.getElementById('campoInteligente').focus();
    }

    render();
</script>
</body>
</html>
