<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S.A.I v5.6 - Visual Detalhado</title>
    <style>
        :root { --primary: #00ff88; --bg: #0d1117; --card: #16213e; --text: #c9d1d9; --accent: #ffae00; --look: #00d4ff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 1200px; margin: auto; }
        .panel { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Estilo da Lista de Atrasados Estilo Exemplo */
        .atrasados-list { background: #010409; border-radius: 8px; padding: 10px; border: 1px solid #333; }
        .item-bicho { 
            padding: 10px; 
            border-bottom: 1px solid #222; 
            font-size: 0.95rem; 
            line-height: 1.4;
        }
        .item-bicho b { color: var(--accent); }
        .dias-count { color: #ff4d4d; font-weight: bold; }
        .milhar-ref { color: var(--primary); font-family: monospace; font-weight: bold; }
        
        textarea { width: 100%; height: 80px; background: #000; color: var(--primary); border: 1px solid #333; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
        .btn { padding: 10px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h2 style="color:var(--primary); margin-top:0;">📥 Lançamento de Resultados</h2>
        <textarea id="inputTxt" placeholder="Cole o resultado aqui..."></textarea>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:var(--primary); color:#000" onclick="lancar('RIO')">GRAVAR NO RIO</button>
            <button class="btn" style="background:var(--look); color:#000" onclick="lancar('LOOK')">GRAVAR NA LOOK</button>
        </div>
    </div>

    <div class="panel">
        <h3 style="color:var(--accent)">⚙️ AJUSTE MANUAL (Caso precise corrigir)</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; align-items: end;">
            <div><small>Grupo:</small><input type="number" id="mG"></div>
            <div><small>Dias:</small><input type="number" id="mD"></div>
            <div><small>Milhar:</small><input type="text" id="mM"></div>
            <div><small>Data:</small><input type="text" id="mDt" placeholder="04/03/26"></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:#444; color:#fff" onclick="ajusteManual('RIO')">AJUSTAR RIO</button>
            <button class="btn" style="background:#444; color:#fff" onclick="ajusteManual('LOOK')">AJUSTAR LOOK</button>
        </div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3 style="color:var(--primary)">🏇 RANKING RIO</h3>
            <div id="listaRio" class="atrasados-list"></div>
        </div>
        <div class="panel">
            <h3 style="color:var(--look)">🎯 RANKING LOOK</h3>
            <div id="listaLook" class="atrasados-list"></div>
        </div>
    </div>
</div>

<script>
    const infoBichos = {
        1: {n:"Avestruz", i:"🦅"}, 2: {n:"Águia", i:"🦅"}, 3: {n:"Burro", i:"🐴"}, 4: {n:"Borboleta", i:"🦋"}, 5: {n:"Cachorro", i:"🐶"},
        6: {n:"Cabra", i:"🐐"}, 7: {n:"Carneiro", i:"🐏"}, 8: {n:"Camelo", i:"🐪"}, 9: {n:"Cobra", i:"🐍"}, 10: {n:"Coelho", i:"🐰"},
        11: {n:"Cavalo", i:"🐎"}, 12: {n:"Elefante", i:"🐘"}, 13: {n:"Galo", i:"🐓"}, 14: {n:"Gato", i:"🐈"}, 15: {n:"Jacaré", i:"🐊"},
        16: {n:"Leão", i:"🦁"}, 17: {n:"Macaco", i:"🐒"}, 18: {n:"Porco", i:"🐷"}, 19: {n:"Pavão", i:"🦚"}, 20: {n:"Peru", i:"🦃"},
        21: {n:"Touro", i:"🐂"}, 22: {n:"Tigre", i:"🐅"}, 23: {n:"Urso", i:"🐻"}, 24: {n:"Veado", i:"🦌"}, 25: {n:"Vaca", i:"🐄"}
    };

    let rRio = JSON.parse(localStorage.getItem('rankRio_v56')) || [];
    let rLook = JSON.parse(localStorage.getItem('rankLook_v56')) || [];

    function init(lista) {
        if(lista.length === 0) {
            for(let i=1; i<=25; i++) lista.push({g:i, d:0, m:"0000", dt: "00/00/00"});
        }
        return lista;
    }

    rRio = init(rRio);
    rLook = init(rLook);

    function lancar(praca) {
        const txt = document.getElementById('inputTxt').value;
        const ms = txt.match(/\d{3,4}/g);
        if(!ms) return alert("Nenhum milhar encontrado!");

        let lista = (praca === 'RIO') ? rRio : rLook;
        let hoje = new Date().toLocaleDateString('pt-BR', {year:'2-digit', month:'2-digit', day:'2-digit'});

        // O primeiro prêmio reseta o atraso
        let m1 = ms[0].padStart(4, '0');
        let g1 = (m1.slice(-2) === "00") ? 25 : Math.ceil(parseInt(m1.slice(-2))/4);
        
        lista.forEach(item => {
            if(item.g === g1) {
                item.d = 0;
                item.m = m1;
                item.dt = hoje;
            } else {
                item.d++; // Aumenta 1 dia para os outros
            }
        });

        salvar();
        document.getElementById('inputTxt').value = "";
    }

    function ajusteManual(praca) {
        let g = parseInt(document.getElementById('mG').value);
        let d = parseInt(document.getElementById('mD').value);
        let m = document.getElementById('mM').value || "----";
        let dt = document.getElementById('mDt').value || "--/--/--";

        if(!g || g < 1 || g > 25) return alert("Grupo inválido");
        let lista = (praca === 'RIO') ? rRio : rLook;
        let item = lista.find(x => x.g === g);
        if(item) {
            item.d = d; item.m = m; item.dt = dt;
        }
        salvar();
    }

    function salvar() {
        localStorage.setItem('rankRio_v56', JSON.stringify(rRio));
        localStorage.setItem('rankLook_v56', JSON.stringify(rLook));
        render();
    }

    function render() {
        const fix = (id, lista) => {
            document.getElementById(id).innerHTML = lista.sort((a,b) => b.d - a.d).map(x => `
                <div class="item-bicho">
                    ${infoBichos[x.g].i} <b>${x.g.toString().padStart(2,'0')} - ${infoBichos[x.g].n}</b> 
                    atrasado há <span class="dias-count">${x.d} dias</span>, 
                    em <i>${x.dt}</i>, no milhar <span class="milhar-ref">${x.m}</span>
                </div>
            `).join('');
        }
        fix('listaRio', rRio);
        fix('listaLook', rLook);
    }

    render();
</script>
</body>
</html>
