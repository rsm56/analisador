<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGINAL JB - PALPITE NOVO</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a1a; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .header { background: #1a1a1a; color: #fff; width: 100%; max-width: 400px; text-align: center; padding: 15px 0; border-radius: 12px; margin-bottom: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; border: 1px solid #ddd; }
        
        .top-results { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .box-fixo { background: #fff; border: 2px solid #1a1a1a; border-radius: 10px; padding: 10px; flex: 1; text-align: center; }
        .box-val { font-size: 22px; font-weight: bold; color: #27ae60; display: block; }
        .box-lab { font-size: 9px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }

        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 20px; text-align: center; font-weight: bold; }
        button { width: 100%; padding: 16px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .res-item { background: white; margin-bottom: 8px; padding: 12px; border-radius: 10px; border-left: 6px solid #e67e22; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 400px; box-sizing: border-box; }
        .res-gp { background: #e67e22; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; font-size: 18px; }
        .res-nome { font-weight: bold; font-size: 16px; margin-left: 10px; flex-grow: 1; }
        .res-dez { font-size: 20px; font-weight: bold; color: #e67e22; font-family: monospace; }
        .sec-title { margin: 20px 0 10px; font-size: 12px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; text-align: center; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 20px;">REGINAL JB</h1>
        <span style="font-size: 10px; opacity: 0.8;">GERADOR DE NOVOS PALPITES</span>
    </div>

    <div class="card">
        <div class="input-row">
            <div style="flex:2">
                <label style="font-size:10px; font-weight:bold;">MILHAR BASE</label>
                <input type="number" id="milhar" placeholder="0000">
            </div>
            <div style="flex:1">
                <label style="font-size:10px; font-weight:bold;">DEZENA</label>
                <input type="number" id="dezena" placeholder="00">
            </div>
        </div>
        <button onclick="analisar()">CALCULAR NOVOS PALPITES</button>
    </div>

    <div id="bloco-topo" class="top-results" style="display:none; margin-top:15px;">
        <div class="box-fixo"><span id="v-cent" class="box-val">--</span><span class="box-lab">NOVA CENTENA</span></div>
        <div class="box-fixo"><span id="v-dez" class="box-val">--</span><span class="box-lab">NOVA DEZENA</span></div>
        <div class="box-fixo"><span id="v-data" class="box-val">--</span><span class="box-lab">DATA</span></div>
    </div>

    <div id="resultado" style="width:100%; max-width:400px;"></div>

<script>
    const animais = [
        {g:1, n:"Avestruz", d:["01","02","03","04"]}, {g:2, n:"Águia", d:["05","06","07","08"]},
        {g:3, n:"Burro", d:["09","10","11","12"]}, {g:4, n:"Borboleta", d:["13","14","15","16"]},
        {g:5, n:"Cachorro", d:["17","18","19","20"]}, {g:6, n:"Cabra", d:["21","22","23","24"]},
        {g:7, n:"Carneiro", d:["25","26","27","28"]}, {g:8, n:"Camelo", d:["29","30","31","32"]},
        {g:9, n:"Cobra", d:["33","34","35","36"]}, {g:10, n:"Coelho", d:["37","38","39","40"]},
        {g:11, n:"Cavalo", d:["41","42","43","44"]}, {g:12, n:"Elefante", d:["45","46","47","48"]},
        {g:13, n:"Galo", d:["49","50","51","52"]}, {g:14, n:"Gato", d:["53","54","55","56"]},
        {g:15, n:"Jacaré", d:["57","58","59","60"]}, {g:16, n:"Leão", d:["61","62","63","64"]},
        {g:17, n:"Macaco", d:["65","66","67","68"]}, {g:18, n:"Porco", d:["69","70","71","72"]},
        {g:19, n:"Pavão", d:["73","74","75","76"]}, {g:20, n:"Peru", d:["77","78","79","80"]},
        {g:21, n:"Touro", d:["81","82","83","84"]}, {g:22, n:"Tigre", d:["85","86","87","88"]},
        {g:23, n:"Urso", d:["89","90","91","92"]}, {g:24, n:"Veado", d:["93","94","95","96"]},
        {g:25, n:"Vaca", d:["97","98","99","00"]}
    ];

    function formatar(n, digitos) { return String(Math.abs(Math.floor(n))).slice(-digitos).padStart(digitos, '0'); }

    function analisar() {
        let milhar = document.getElementById('milhar').value;
        if(milhar.length < 3) return alert("Digite a milhar base.");

        let mArr = milhar.padStart(4, '0').split('').map(Number);
        let soma = mArr.reduce((a, b) => a + b, 0);
        let dEntrada = parseInt(milhar.slice(-2));

        // --- CÁLCULOS DE NOVOS PALPITES ---
        // Nova Centena: (Soma das Milhar * Primeiro Dígito) + 7
        let novaCentena = formatar((soma * (mArr[0] || 1)) + 77, 3);
        // Nova Dezena: Regra do Salto de 7 sobre a dezena da milhar digitada
        let novaDezena = formatar(dEntrada + 7, 2);

        document.getElementById('bloco-topo').style.display = 'flex';
        document.getElementById('v-cent').innerText = novaCentena;
        document.getElementById('v-dez').innerText = novaDezena;
        document.getElementById('v-data').innerText = new Date().getDate().toString().padStart(2, '0');

        // --- CÁLCULO DOS 5 GRUPOS ELITE (Com Salto de 7 Grupos) ---
        let dBase = [novaDezena, formatar(soma + 7, 2), formatar(parseInt(novaCentena), 2)];
        let forca = {};

        dBase.forEach(dz => {
            let b = animais.find(a => a.d.includes(dz)) || animais[Math.floor(Math.random()*25)];
            let nG = b.g + 8; // Salto de 7 grupos (8º bicho)
            if(nG > 25) nG -= 25;
            let bSalto = animais.find(a => a.g === nG);

            if(!forca[bSalto.g]) forca[bSalto.g] = { n: bSalto.n, p: 0, d: bSalto.d[Math.floor(Math.random()*4)] };
            forca[bSalto.g].p += 1;
        });

        let top = Object.entries(forca).sort((a,b) => b[1].p - a[1].p).slice(0,5);
        
        let html = '<div class="sec-title">5 GRUPOS CALCULADOS P/ PRÓXIMO</div>';
        top.forEach(([gp, info]) => {
            html += `<div class="res-item"><div class="res-gp">${gp.padStart(2,'0')}</div><div class="res-nome">${info.n.toUpperCase()}</div><div class="res-dez">${info.d}</div></div>`;
        });
        document.getElementById('resultado').innerHTML = html;
    }
</script>
</body>
</html>
