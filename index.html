<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGINAL JB - LÓGICA DE GRUPOS</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; color: #333; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { background: #1a1a1a; color: #fff; width: 100%; text-align: center; padding: 15px 0; border-radius: 10px; margin-bottom: 15px; width: 100%; max-width: 400px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .input-box { flex: 1; }
        label { font-size: 11px; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 18px; text-align: center; box-sizing: border-box; font-weight: bold; }
        button { width: 100%; padding: 16px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .fortes-container { display: flex; justify-content: space-between; gap: 10px; margin-top: 20px; width: 100%; max-width: 400px; }
        .forte-box { background: #fff; border: 2px solid #2c3e50; border-radius: 10px; padding: 10px; flex: 1; text-align: center; }
        .forte-val { font-size: 20px; font-weight: bold; color: #e67e22; display: block; }
        .forte-label { font-size: 10px; font-weight: bold; color: #7f8c8d; text-transform: uppercase; }

        .res-container { width: 100%; max-width: 400px; margin-top: 20px; }
        .res-item { background: white; margin-bottom: 10px; padding: 12px; border-radius: 10px; border-left: 6px solid #27ae60; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .res-gp-box { background: #27ae60; color: white; padding: 8px; border-radius: 6px; font-weight: bold; min-width: 30px; text-align: center; }
        .res-name { font-weight: bold; font-size: 15px; margin-left: 10px; }
        .res-dezena { font-size: 18px; font-weight: bold; color: #27ae60; }
        .title-secao { text-align: center; color: #2c3e50; font-size: 13px; font-weight: bold; margin: 15px 0 10px 0; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 22px;">REGINAL JB</h1>
        <span style="font-size: 10px;">SALTO DE 7 NOS GRUPOS</span>
    </div>

    <div class="card">
        <div class="input-row">
            <div class="input-box">
                <label>Milhar</label>
                <input type="number" id="milhar" pattern="\d*" placeholder="0000">
            </div>
            <div class="input-box">
                <label>Dezena</label>
                <input type="number" id="dezena" pattern="\d*" placeholder="00">
            </div>
        </div>
        <button onclick="analisar()">BUSCAR GRUPOS FORTES</button>
    </div>

    <div id="bloco-fortes" class="fortes-container" style="display:none;">
        <div class="forte-box"><span id="res-cent" class="forte-val">--</span><span class="forte-label">CENT</span></div>
        <div class="forte-box"><span id="res-dez" class="forte-val">--</span><span class="forte-label">DEZ</span></div>
        <div class="forte-box"><span id="res-data" class="forte-val">--</span><span class="forte-label">DATA</span></div>
    </div>

    <div id="resultado" class="res-container"></div>

<script>
    const animais = [
        {g:1, n:"Avestruz", d:["01","02","03","04"]}, {g:2, n:"Águia", d:["05","06","07","08"]},
        {g:3, n:"Burro", d:["09","10","11","12"]}, {g:4, n:"Borboleta", d:["13","14","15","16"]},
        {g:5, n:"Cachorro", d:["17","18","19","20"]}, {g:6, n:"Cabra", d:["21","22","23","24"]},
        {g:7, n:"Carneiro", d:["25","26","27","28"]}, {g:8, n:"Camelo", d:["29","30","31","32"]},
        {g:9, n:"Cobra", d:["33","34","35","36"]}, {g:10, n:"Coelho", d:["37","38","39","40"]},
        {g:11, n:"Cavalo", d:["41","42","43","44"]}, {g:12, n:"Elefante", d:["45","46","47","48"]},
        {g:13, n:"Galo", d:["49","50","51","52"]}, {g:14, n:"Gato", d:["53","54","55","56"]},
        {g:15, n:"Jacaré", d:["57","58","59","60"]}, {g:16, n:"Leão", d:["61","62","63","64"]},
        {g:17, n:"Macaco", d:["65","66","67","68"]}, {g:18, n:"Porco", d:["69","70","71","72"]},
        {g:19, n:"Pavão", d:["73","74","75","76"]}, {g:20, n:"Peru", d:["77","78","79","80"]},
        {g:21, n:"Touro", d:["81","82","83","84"]}, {g:22, n:"Tigre", d:["85","86","87","88"]},
        {g:23, n:"Urso", d:["89","90","91","92"]}, {g:24, n:"Veado", d:["93","94","95","96"]},
        {g:25, n:"Vaca", d:["97","98","99","00"]}
    ];

    function formatar(n) { return String(Math.abs(Math.floor(n)) % 100).padStart(2, '0'); }

    function analisar() {
        let milharStr = document.getElementById('milhar').value;
        if(milharStr.length < 3) return alert("Digite a milhar.");

        document.getElementById('bloco-fortes').style.display = 'flex';
        document.getElementById('res-cent').innerText = milharStr.slice(-3);
        document.getElementById('res-dez').innerText = milharStr.slice(-2);
        document.getElementById('res-data').innerText = new Date().getDate().toString().padStart(2, '0');

        let m = milharStr.padStart(4, '0').split('').map(Number);
        let soma = m.reduce((a, b) => a + b, 0);
        let dr = parseInt(document.getElementById('dezena').value) || 0;

        // Lista de dezenas para processar
        let dezenasBase = [formatar(soma), formatar(dr), milharStr.slice(-2), formatar(m[0]*m[3]), formatar(m[1]*m[2])];
        
        let forcaGrupos = {};

        dezenasBase.forEach(dz => {
            let bichoAtual = animais.find(a => a.d.includes(dz)) || animais[24];
            
            // Regra do 7 nos Grupos: se é grupo 5, pula 7 e vai pro 13
            let proximoGrupoNum = bichoAtual.g + 8; 
            if (proximoGrupoNum > 25) proximoGrupoNum -= 25;
            
            let bichoSalto = animais.find(a => a.g === proximoGrupoNum);

            // Pontuar o bicho do salto (Regra do 7)
            if (!forcaGrupos[bichoSalto.g]) forcaGrupos[bichoSalto.g] = { nome: bichoSalto.n, pontos: 0, dezena: bichoSalto.d[0] };
            forcaGrupos[bichoSalto.g].pontos += 2; // Salto tem peso maior

            // Pontuar bicho da inversão
            let inv = dz.split('').reverse().join('').padStart(2, '0');
            let bichoInv = animais.find(a => a.d.includes(inv)) || bichoAtual;
            if (!forcaGrupos[bichoInv.g]) forcaGrupos[bichoInv.g] = { nome: bichoInv.n, pontos: 0, dezena: inv };
            forcaGrupos[bichoInv.g].pontos += 1;
        });

        let top5 = Object.entries(forcaGrupos).sort((a, b) => b[1].pontos - a[1].pontos).slice(0, 5);

        let html = '<div class="title-secao">Melhores Grupos (Pulo de 7)</div>';
        top5.forEach(([gp, info]) => {
            html += `<div class="res-item"><div style="display:flex; align-items:center;"><div class="res-gp-box">${gp.padStart(2, '0')}</div><span class="res-name">${info.nome.toUpperCase()}</span></div><div class="res-dezena">${info.dezena}</div></div>`;
        });
        document.getElementById('resultado').innerHTML = html;
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
