<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>S.A.I v5.2 - Painel Único</title>
    <style>
        :root { --primary: #00ff88; --bg: #0d1117; --card: #16213e; --text: #c9d1d9; --accent: #ffae00; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .panel { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 20px; text-align: center; }
        .number { font-size: 5rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--primary); }
        textarea { width: 100%; height: 100px; background: #010409; color: var(--primary); border: 1px solid #30363d; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
        .btn { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h2 style="color:var(--primary)">GRUPO MAIS ATRASADO (GERAL)</h2>
        <div class="number" id="rei">--</div>
        <div id="top5" style="color:#888; margin-top:10px;">Aguardando dados...</div>
    </div>

    <div class="panel">
        <textarea id="input" placeholder="Cole resultados ou backup aqui..."></textarea>
        <button class="btn" style="background:var(--primary); color:#000" onclick="gravar()">GRAVAR / ATUALIZAR</button>
        <button class="btn" style="background:var(--accent); color:#000" onclick="importar()">💉 INJETAR BACKUP TXT</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('sai_v52_db')) || [];

    function gravar() {
        const txt = document.getElementById('input').value;
        txt.split('\n').forEach(l => {
            let m = l.match(/\d{3,4}/);
            if(m) {
                let milhar = m[0].padStart(4, '0');
                let grp = (milhar.slice(-2) === "00") ? 25 : Math.ceil(parseInt(milhar.slice(-2))/4);
                db.unshift({ m: milhar, g: grp });
            }
        });
        salvar();
    }

    function analisar() {
        if(db.length === 0) return;
        let f = {}; for(let i=1; i<=25; i++) f[i]=0;
        db.forEach(x => f[x.g]++);
        let ordenados = Object.keys(f).sort((a,b) => f[a] - f[b]);
        document.getElementById('rei').innerText = ordenados[0].padStart(2,'0');
        document.getElementById('top5').innerText = "Top Atrasados: " + ordenados.slice(0,5).join(" - ");
    }

    function importar() {
        try {
            let backup = JSON.parse(document.getElementById('input').value);
            db = backup;
            salvar();
            alert("Backup carregado com sucesso!");
        } catch(e) { alert("Erro ao ler backup!"); }
    }

    function salvar() {
        localStorage.setItem('sai_v52_db', JSON.stringify(db));
        analisar();
        document.getElementById('input').value = "";
    }

    analisar();
</script>
</body>
</html>
