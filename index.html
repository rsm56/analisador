<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGINAL JB - SISTEMA ELITE v6.0</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; color: #333; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .header { background: #2c3e50; color: #fff; width: 100%; text-align: center; padding: 20px 0; border-radius: 10px; margin-bottom: 20px; width: 100%; max-width: 400px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        .input-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .input-box { flex: 1; }
        label { font-size: 12px; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; border: 2px solid #bdc3c7; border-radius: 10px; font-size: 20px; text-align: center; box-sizing: border-box; font-weight: bold; color: #2c3e50; }
        input:focus { border-color: #27ae60; outline: none; }
        button { width: 100%; padding: 18px; background: #27ae60; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #219150; }
        
        .res-container { width: 100%; max-width: 400px; margin-top: 25px; }
        .res-item { background: white; margin-bottom: 12px; padding: 15px; border-radius: 12px; border-left: 6px solid #27ae60; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .res-main { display: flex; align-items: center; }
        .res-gp-box { background: #27ae60; color: white; padding: 10px; border-radius: 8px; font-weight: bold; min-width: 35px; text-align: center; font-size: 18px; }
        .res-name { margin-left: 15px; font-weight: bold; font-size: 17px; color: #2c3e50; }
        .res-dezena { font-family: monospace; font-size: 22px; font-weight: bold; color: #27ae60; background: #f0fff4; padding: 5px 10px; border-radius: 5px; border: 1px dashed #27ae60; }
        .title-secao { text-align: center; color: #7f8c8d; font-size: 13px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size: 26px;">REGINAL JB</h1>
        <span style="font-size: 12px; opacity: 0.8;">MÓDULO INVERSÃO + REGRA 10</span>
    </div>

    <div class="card">
        <div class="input-row">
            <div class="input-box">
                <label>Milhar</label>
                <input type="number" id="milhar" pattern="\d*" placeholder="0000">
            </div>
            <div class="input-box">
                <label>Dezena</label>
                <input type="number" id="dezena" pattern="\d*" placeholder="00">
            </div>
        </div>
        <button onclick="analisar()">BUSCAR 5 GRUPOS ELITE</button>
    </div>

    <div id="resultado" class="res-container"></div>

<script>
    const animais = [
        {g:1, n:"Avestruz", d:["01","02","03","04"]}, {g:2, n:"Águia", d:["05","06","07","08"]},
        {g:3, n:"Burro", d:["09","10","11","12"]}, {g:4, n:"Borboleta", d:["13","14","15","16"]},
        {g:5, n:"Cachorro", d:["17","18","19","20"]}, {g:6, n:"Cabra", d:["21","22","23","24"]},
        {g:7, n:"Carneiro", d:["25","26","27","28"]}, {g:8, n:"Camelo", d:["29","30","31","32"]},
        {g:9, n:"Cobra", d:["33","34","35","36"]}, {g:10, n:"Coelho", d:["37","38","39","40"]},
        {g:11, n:"Cavalo", d:["41","42","43","44"]}, {g:12, n:"Elefante", d:["45","46","47","48"]},
        {g:13, n:"Galo", d:["49","50","51","52"]}, {g:14, n:"Gato", d:["53","54","55","56"]},
        {g:15, n:"Jacaré", d:["57","58","59","60"]}, {g:16, n:"Leão", d:["61","62","63","64"]},
        {g:17, n:"Macaco", d:["65","66","67","68"]}, {g:18, n:"Porco", d:["69","70","71","72"]},
        {g:19, n:"Pavão", d:["73","74","75","76"]}, {g:20, n:"Peru", d:["77","78","79","80"]},
        {g:21, n:"Touro", d:["81","82","83","84"]}, {g:22, n:"Tigre", d:["85","86","87","88"]},
        {g:23, n:"Urso", d:["89","90","91","92"]}, {g:24, n:"Veado", d:["93","94","95","96"]},
        {g:25, n:"Vaca", d:["97","98","99","00"]}
    ];

    function formatar(n) { 
        let num = Math.abs(Math.floor(n)) % 100;
        return String(num).padStart(2, '0'); 
    }

    // NOVA FUNÇÃO DE INVERSÃO PARA DEZENAS ALTAS
    function tratarDezena(dStr) {
        let n = parseInt(dStr);
        // Se a dezena for maior que 25 (pensando em grupos) ou para criar variação
        // Invertemos o número (ex: 82 -> 28)
        let inv = dStr.split('').reverse().join('');
        return [dStr, inv, formatar(n + 10), formatar(n - 10)];
    }

    function analisar() {
        let milharStr = document.getElementById('milhar').value;
        let dezRes = document.getElementById('dezena').value;

        if(milharStr.length < 3) {
            alert("Digite a milhar.");
            return;
        }

        let m = milharStr.padStart(4, '0').split('').map(Number);
        let dr = parseInt(dezRes) || 0;
        let soma = m.reduce((a, b) => a + b, 0);

        // Cálculos Base
        let s1 = formatar(soma);
        let s2 = formatar(dr + 7);
        let s3 = milharStr.slice(-2);
        let s4 = formatar(m[0]*m[3]);
        let s5 = formatar(m[1]*m[2]);

        // Aplicando a Regra de Inversão e +/- 10 em cada cálculo base
        let todasDezenas = [];
        [s1, s2, s3, s4, s5].forEach(dz => {
            todasDezenas.push(...tratarDezena(dz));
        });

        // Mapear para Grupos e Contar Força
        let forcaGrupos = {};
        todasDezenas.forEach(d => {
            let bicho = animais.find(a => a.d.includes(d)) || animais[24];
            if (!forcaGrupos[bicho.g]) {
                forcaGrupos[bicho.g] = { nome: bicho.n, pontos: 0, dezenaExemplo: d };
            }
            forcaGrupos[bicho.g].pontos += 1;
        });

        // Pegar os 5 Grupos mais fortes sem repetir
        let top5 = Object.entries(forcaGrupos)
            .sort((a, b) => b[1].pontos - a[1].pontos)
            .slice(0, 5);

        let resDiv = document.getElementById('resultado');
        resDiv.innerHTML = '<div class="title-secao">Top 5 Grupos Selecionados</div>';

        top5.forEach(([gp, info]) => {
            resDiv.innerHTML += `
                <div class="res-item">
                    <div class="res-main">
                        <div class="res-gp-box">${gp.padStart(2, '0')}</div>
                        <span class="res-name">${info.nome.toUpperCase()}</span>
                    </div>
                    <div class="res-dezena">${info.dezenaExemplo}</div>
                </div>`;
        });
        
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>
</body>
</html>
